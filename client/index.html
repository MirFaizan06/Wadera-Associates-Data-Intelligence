<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A365D" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>Wadera Associates – Premium Data Intelligence Platform</title>
    <meta name="description" content="Buy time-series datasets for energy, commodities and financial markets. Oil prices, electricity rates, commodity indices — instant XLSX/CSV/PDF downloads. No subscription needed." />
    <meta name="keywords" content="time series data, energy datasets, commodity data, oil price data, financial market data, buy datasets, data download, XLSX data, CSV data, Pakistan energy data, global commodity prices, data intelligence platform" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Wadera Associates" />

    <!-- Canonical (SPA — react-helmet-async handles per-page canonicals) -->
    <link rel="canonical" href="https://wa-data-intel.netlify.app/" />

    <!-- hreflang for all supported languages -->
    <link rel="alternate" hreflang="en" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="zh" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="es" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="de" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="fr" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="pt" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="ru" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="ja" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="ar" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="hi" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="ko" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="id" href="https://wa-data-intel.netlify.app/" />
    <link rel="alternate" hreflang="x-default" href="https://wa-data-intel.netlify.app/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Wadera Associates" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wa-data-intel.netlify.app/" />
    <meta property="og:title" content="Wadera Associates – Premium Data Intelligence Platform" />
    <meta property="og:description" content="Buy time-series datasets for energy, commodities and financial markets. Instant XLSX/CSV/PDF downloads. No subscription." />
    <meta property="og:image" content="https://wa-data-intel.netlify.app/images/logo.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@WaderaAssoc" />
    <meta name="twitter:title" content="Wadera Associates – Premium Data Intelligence Platform" />
    <meta name="twitter:description" content="Buy time-series datasets for energy, commodities and financial markets. Instant downloads." />
    <meta name="twitter:image" content="https://wa-data-intel.netlify.app/images/logo.webp" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="VmF6xQz3p_3LtdITfNo9mRquNaCC0BRyNxRZwLsPHqE" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://checkout.razorpay.com" />

    <!-- Fonts — display=swap avoids render-block (CWV) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- JSON-LD: WebSite + SearchAction (Sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wadera Associates",
      "url": "https://wa-data-intel.netlify.app/",
      "description": "Premium time-series datasets for energy, commodities, and financial markets.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://wa-data-intel.netlify.app/datasets?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Wadera Associates",
      "url": "https://wa-data-intel.netlify.app/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://wa-data-intel.netlify.app/images/logo.webp",
        "width": 160,
        "height": 56
      },
      "description": "Data intelligence platform providing high-quality time-series datasets for energy, commodities, and financial markets.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://wa-data-intel.netlify.app/contact",
        "availableLanguage": ["English", "Hindi", "Arabic", "Urdu"]
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: DataCatalog -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "DataCatalog",
      "name": "Wadera Associates Dataset Catalog",
      "description": "Premium time-series datasets for energy, commodities, and financial markets available for purchase and instant download.",
      "url": "https://wa-data-intel.netlify.app/datasets",
      "provider": {
        "@type": "Organization",
        "name": "Wadera Associates",
        "url": "https://wa-data-intel.netlify.app/"
      },
      "keywords": ["energy data", "oil prices", "commodity prices", "financial time series", "electricity rates", "Pakistan data"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
